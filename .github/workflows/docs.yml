name: Build and Deploy Docs to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyglenn numpy pandas matplotlib scipy requests
          pip install sphinx nbsphinx sphinx-rtd-theme ipykernel

      - name: Copy notebooks to docs source
        run: |
          cp notebooks/en/*.ipynb docs/source/

      - name: Execute notebooks
        run: |
          python -m jupyter nbconvert --to notebook --execute --inplace \
            docs/source/01_getting_started.ipynb \
            docs/source/02_nasa_polynomials.ipynb \
            docs/source/03_property_curves.ipynb \
            docs/source/04_formation_enthalpy.ipynb \
            docs/source/05_reaction_enthalpies.ipynb \
            docs/source/06_adiabatic_flame_temperature.ipynb \
            docs/source/07_biofuel_comparison.ipynb \
            docs/source/08_equilibrium_gibbs.ipynb \
            docs/source/09_brayton_cycle.ipynb \
            docs/source/10_property_provider.ipynb \
            docs/source/11_thermodynamic_data_comparison.ipynb

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build Sphinx documentation
        run: |
          cp images/pyglenn-overview.png docs/source/_static/
          cd docs
          python -m sphinx -b html source _build/html

      - name: Create .nojekyll
        run: touch docs/_build/html/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
