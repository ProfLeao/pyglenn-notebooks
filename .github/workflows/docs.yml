name: Build and Deploy Docs to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyglenn numpy pandas matplotlib scipy requests
          pip install sphinx nbsphinx sphinx-rtd-theme ipykernel

      - name: Copy notebooks to docs source
        run: |
          cp notebooks/en/*.ipynb docs/source/
          cp notebooks/pt/*.ipynb docs/source/pt/
          cp notebooks/es/*.ipynb docs/source/es/

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build English documentation (main)
        run: |
          cp images/pyglenn-overview.png docs/source/_static/
          cd docs
          sphinx-build -b html source _build/html

      - name: Build Portuguese documentation
        run: |
          cd docs
          sphinx-build -b html -c source source/pt _build/html/pt

      - name: Build Spanish documentation
        run: |
          cd docs
          sphinx-build -b html -c source source/es _build/html/es

      - name: Create .nojekyll
        run: touch docs/_build/html/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
